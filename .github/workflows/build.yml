name: Build Desktop Installers

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build Windows executable
      run: |
        python build.py --platform windows

    - name: Normalize Windows executable path
      shell: pwsh
      run: |
        Set-Location $env:GITHUB_WORKSPACE
        $primaryExe = Join-Path $env:GITHUB_WORKSPACE "dist\Continium.exe"
        $fallbackExe = Join-Path $env:GITHUB_WORKSPACE "dist\Continium\Continium.exe"

        if (Test-Path $primaryExe) {
          Write-Host "Using Windows executable: $primaryExe"
        } elseif (Test-Path $fallbackExe) {
          Copy-Item $fallbackExe $primaryExe -Force
          Write-Host "Copied fallback executable to: $primaryExe"
        } else {
          Write-Host "No Windows executable found in dist/. Current dist tree:"
          if (Test-Path (Join-Path $env:GITHUB_WORKSPACE "dist")) {
            Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE "dist") -Recurse -Force | ForEach-Object { Write-Host $_.FullName }
          }
          throw "Could not find Continium executable in dist output"
        }
    
    - name: Create NSIS installer
      run: |
        choco install nsis -y
        Set-Location $env:GITHUB_WORKSPACE
        $makensis = (Get-Command makensis -ErrorAction SilentlyContinue).Source
        if (-not $makensis) {
          $fallback = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $fallback) {
            $makensis = $fallback
          }
        }
        if (-not $makensis) {
          throw "makensis not found after NSIS installation"
        }
        $installerScript = Join-Path $env:GITHUB_WORKSPACE "installer\windows\installer.nsi"
        if (-not (Test-Path $installerScript)) {
          throw "NSIS script not found: $installerScript"
        }
        & $makensis $installerScript
    
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Continium-Windows
        path: |
          ${{ github.workspace }}/dist/Continium.exe
          ${{ github.workspace }}/dist/Continium-Setup.exe
        if-no-files-found: error
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/Continium.exe
          dist/Continium-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build macOS app
      run: |
        python build.py --platform macos
    
    - name: Create DMG
      run: |
        brew install create-dmg
        rm -f dist/Continium.dmg
        create-dmg \
          --volname "Continium" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --app-drop-link 600 185 \
          "dist/Continium.dmg" \
          "dist/Continium.app"
    
    - name: Upload macOS app artifact
      uses: actions/upload-artifact@v4
      with:
        name: Continium-macOS-app
        path: dist/Continium.app
        if-no-files-found: error

    - name: Upload macOS DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: Continium-macOS-dmg
        path: dist/Continium.dmg
        if-no-files-found: error
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/Continium.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
