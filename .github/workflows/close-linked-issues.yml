name: Close Linked Issues

on:
  pull_request:
    types: [closed]
    branches: [dev]

permissions:
  issues: write
  pull-requests: read

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Close issues referenced by the PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: pr.number },
              (response) => response.data
            );

            const text = [pr.title, pr.body ?? '', ...commits.map((commit) => commit.commit.message)].join('\n');
            const matches = Array.from(text.matchAll(/\b(?:close[sd]?|fix(?:es)?|resolve[sd]?)\s+#(\d+)\b/gi));
            const issueNumbers = [...new Set(matches.map((match) => Number(match[1])).filter(Number.isInteger))];

            if (issueNumbers.length === 0) {
              core.info('No linked issues found.');
              return;
            }

            for (const issue_number of issueNumbers) {
              await github.rest.issues.update({ owner, repo, issue_number, state: 'closed' });
              core.info(`Closed issue #${issue_number}.`);
            }
