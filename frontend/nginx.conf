server {
    listen 80;
    server_name continium.uz www.continium.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name continium.uz www.continium.uz;

    ssl_certificate /etc/letsencrypt/live/continium.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/continium.uz/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API calls to the backend container
    location /api/ {
        proxy_pass http://continium-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all unknown routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
